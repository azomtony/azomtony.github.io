- title: "Machine-Learned Force Fields for Graphene Oxide Interfaces"
  type: "Research"
  category: "Solid-Liquid Interfaces / MLFF"
  featured: true
  media:
    - src: "/assets/images/mlff-al.png"
      label: "Active Learning Workflow"
  summary: "Developed two deep neural network force-fileds (DNFFs) with and without presence of excess protons to study structure and reactivity at graphene oxide–water interfaces using active learning. The DNFFs were trained on ab initio molecular dynamics (AIMD) reference data and used to perform large-scale simulations of interfacial water structure, proton transfer, and vibrational sum-frequency generation spectra. A MACE potential was developed to simulate graphene oxide–methanol interfaces, to study proto transfer at the interface in longer timescales." 
  methods:
    - "DeePMD"
    - "MACE"
    - "Query by Committee"
    - "Ab initio molecular dynamics (AIMD)"
    - "Single-point DFT calculations"
    - "LAMMPS"
    - "ASE"
