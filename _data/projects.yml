  #   url: "/publications/#go-to-graphene-mlff"

- title: "Asphaltene Adsorption and Aggregation in Complex Solvent Environments"
  type: "Research"
  category: "Energy, Fuels, and Interfaces"
  featured: true
  media:
    - src: "/assets/images/asp-tol.gif"
      label: "Toluene"
    - src: "/assets/images/asp-hep.gif"
      label: "Heptane"
  summary: "Investigated how asphaltene molecules organize, aggregate, and interact with surrounding solvent environments, using molecular dynamics simulations to compare solvent-dependent association, cluster formation, and interfacial behavior. The project connects atomistic configurations with larger questions of deposition, stability, and fouling in petroleum-relevant systems."
  impact: "Links molecular-scale aggregation and adsorption mechanisms to enhanced oil recovery."
  methods:
    - "Classical MD"
    - "Force-field parameterization"
    - "PMF calculations"
    - "Umbrella sampling"
    - "Metadynamics"
    - "Adsorption"
    - "Aggregation"
    - "MLIP"
    - "UMA foundational model"
    - "Trajectory analysis"
  visual: "asphaltene"

