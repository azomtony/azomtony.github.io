  <rect width="1200" height="630" rx="28" fill="url(#bg)"/>
  <rect width="1200" height="630" rx="28" fill="url(#halo)"/>

  <g filter="url(#glow)" stroke="url(#flow)" stroke-width="12" stroke-linejoin="round" stroke-linecap="round">
